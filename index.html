<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Day Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky1: #0a0e27;
    --sky2: #1a1040;
    --sky3: #2d1b69;
    --accent: #f0c060;
    --accent2: #e87040;
    --glass: rgba(255,255,255,0.07);
    --glass-border: rgba(255,255,255,0.12);
    --text: rgba(255,255,255,0.92);
    --muted: rgba(255,255,255,0.45);
    --done-line: rgba(255,255,255,0.3);
    --font-display: 'DM Serif Display', serif;
    --font-body: 'DM Sans', sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: var(--font-body);
    touch-action: pan-y;
  }

  #bg {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(160deg, var(--sky1) 0%, var(--sky2) 45%, var(--sky3) 100%);
    overflow: hidden;
  }

  .star {
    position: absolute; border-radius: 50%;
    background: white; opacity: 0;
    animation: twinkle var(--d) ease-in-out infinite var(--delay);
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--max-op); transform: scale(1); }
  }

  .aurora {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18;
    animation: drift var(--d) ease-in-out infinite alternate;
  }
  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(var(--tx), var(--ty)) scale(1.15); }
  }

  .moon {
    position: absolute; top: 10%; right: 12%;
    width: 64px; height: 64px; border-radius: 50%;
    background: radial-gradient(circle at 35% 38%, #fff8e0, #f5cc60 60%, #d4a030);
    box-shadow: 0 0 40px 10px rgba(240,190,60,0.25), 0 0 80px 30px rgba(240,190,60,0.1);
    animation: moonpulse 6s ease-in-out infinite;
  }
  @keyframes moonpulse {
    0%,100% { box-shadow: 0 0 40px 10px rgba(240,190,60,0.25), 0 0 80px 30px rgba(240,190,60,0.1); }
    50% { box-shadow: 0 0 55px 18px rgba(240,190,60,0.35), 0 0 110px 50px rgba(240,190,60,0.15); }
  }

  #app {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top, 16px) 20px env(safe-area-inset-bottom, 16px);
    overflow: hidden;
  }

  .header {
    flex-shrink: 0;
    padding: 16px 0 8px;
    text-align: center;
  }
  .header .time {
    font-size: 56px; font-family: var(--font-display);
    color: var(--text); line-height: 1; letter-spacing: -1px;
  }
  .header .date-line {
    font-size: 13px; font-weight: 300; letter-spacing: 2.5px;
    color: var(--muted); text-transform: uppercase; margin-top: 4px;
  }
  .header .greeting {
    font-family: var(--font-display); font-style: italic;
    font-size: 17px; color: var(--accent); margin-top: 6px;
    opacity: 0.9;
  }

  .progress-bar-wrap {
    flex-shrink: 0; margin: 12px 0 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 999px; height: 4px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .progress-label {
    text-align: right; font-size: 11px;
    color: var(--muted); margin-top: 4px;
    letter-spacing: 0.5px;
  }

  .task-scroll {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .task-scroll::-webkit-scrollbar { display: none; }

  .task-list { list-style: none; padding: 4px 0 8px; }

  .task-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 11px 14px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 14px; margin-bottom: 8px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    transition: opacity 0.3s, transform 0.2s;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .task-item.done { opacity: 0.5; }

  .check-btn {
    flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.4); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.25s; -webkit-tap-highlight-color: transparent;
    margin-top: 1px;
  }
  .check-btn.checked {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-color: transparent;
  }
  .check-btn svg { display: none; }
  .check-btn.checked svg { display: block; }

  .task-text {
    flex: 1; font-size: 15px; font-weight: 400; color: var(--text);
    line-height: 1.4; word-break: break-word;
    border: none; background: transparent; outline: none;
    font-family: var(--font-body); resize: none; overflow: hidden;
    caret-color: var(--accent);
  }
  .task-text.done {
    text-decoration: line-through;
    text-decoration-color: var(--done-line);
    color: var(--muted);
  }
  .task-text::placeholder { color: rgba(255,255,255,0.28); }

  .del-btn {
    flex-shrink: 0; background: none; border: none;
    color: rgba(255,255,255,0.2); cursor: pointer;
    font-size: 18px; line-height: 1; padding: 2px;
    transition: color 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .del-btn:active { color: rgba(240,80,60,0.8); }

  .add-row {
    flex-shrink: 0; display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px dashed rgba(255,255,255,0.2);
    border-radius: 14px; margin-top: 4px;
    backdrop-filter: blur(8px);
  }
  .add-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-size: 14px; color: var(--text); font-family: var(--font-body);
    caret-color: var(--accent);
  }
  .add-input::placeholder { color: rgba(255,255,255,0.28); }
  .add-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; border-radius: 8px; color: #1a0c00;
    font-size: 20px; width: 30px; height: 30px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .footer {
    flex-shrink: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 2px 4px;
  }
  .footer-note {
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.3px;
  }
  .clear-btn {
    font-size: 11px; color: rgba(240,100,60,0.55);
    background: none; border: none; cursor: pointer;
    font-family: var(--font-body); letter-spacing: 0.3px;
    -webkit-tap-highlight-color: transparent;
  }
  .clear-btn:active { color: rgba(240,100,60,0.9); }

  .wallpaper-tip {
    text-align: center; font-size: 10.5px; color: rgba(255,255,255,0.2);
    margin-top: 2px; letter-spacing: 0.3px; flex-shrink: 0;
  }

  @media (max-height: 650px) {
    .header .time { font-size: 42px; }
    .header .greeting { display: none; }
    .task-item { padding: 9px 12px; }
  }
</style>
</head>
<body>

<div id="bg">
  <div class="moon"></div>
</div>

<div id="app">
  <div class="header">
    <div class="time" id="clock">00:00</div>
    <div class="date-line" id="dateline">Monday, January 1</div>
    <div class="greeting" id="greeting">Good morning</div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 of 0 done</div>

  <div class="task-scroll">
    <ul class="task-list" id="taskList"></ul>
  </div>

  <div class="add-row">
    <input class="add-input" id="addInput" type="text" placeholder="Add a new task…" maxlength="120">
    <button class="add-btn" id="addBtn" aria-label="Add task">+</button>
  </div>

  <div class="footer">
    <span class="footer-note" id="streakNote"></span>
    <button class="clear-btn" id="clearDoneBtn">Clear done</button>
  </div>
  <div class="wallpaper-tip">💡 In Chrome: Menu → Add to Home Screen → use as wallpaper launcher</div>
</div>

<script>
(function() {
  const STORAGE_KEY = 'wallpaper_tasks_v1';
  const today = () => new Date().toISOString().slice(0, 10);

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch(e) { return null; }
  }

  function saveData(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  }

  let data = loadData();
  const todayStr = today();

  if (!data || data.date !== todayStr) {
    const carried = [];
    if (data && data.tasks) {
      data.tasks.filter(t => !t.done).forEach(t => {
        carried.push({ id: Date.now() + Math.random(), text: t.text, done: false });
      });
    }
    if (carried.length === 0) {
      carried.push(
        { id: 1, text: 'Morning workout or a short walk', done: false },
        { id: 2, text: 'Review today\'s priorities', done: false },
        { id: 3, text: 'Drink 8 glasses of water', done: false }
      );
    }
    data = { date: todayStr, tasks: carried, streak: (data && data.date) ? (data.streak || 0) + 1 : 1 };
    saveData(data);
  }

  function renderTasks() {
    const list = document.getElementById('taskList');
    list.innerHTML = '';
    data.tasks.forEach(task => {
      const li = document.createElement('li');
      li.className = 'task-item' + (task.done ? ' done' : '');
      li.dataset.id = task.id;

      const checkBtn = document.createElement('button');
      checkBtn.className = 'check-btn' + (task.done ? ' checked' : '');
      checkBtn.setAttribute('aria-label', task.done ? 'Mark undone' : 'Mark done');
      checkBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="1.5,6 4.5,9 10.5,3" stroke="#1a0c00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      checkBtn.addEventListener('click', () => toggleTask(task.id));

      const textarea = document.createElement('textarea');
      textarea.className = 'task-text' + (task.done ? ' done' : '');
      textarea.value = task.text;
      textarea.rows = 1;
      textarea.setAttribute('aria-label', 'Task text');
      textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
        task.text = this.value;
        saveData(data);
      });
      textarea.addEventListener('blur', () => saveData(data));

      const delBtn = document.createElement('button');
      delBtn.className = 'del-btn';
      delBtn.textContent = '×';
      delBtn.setAttribute('aria-label', 'Delete task');
      delBtn.addEventListener('click', () => deleteTask(task.id));

      li.appendChild(checkBtn);
      li.appendChild(textarea);
      li.appendChild(delBtn);
      list.appendChild(li);

      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    });
    updateProgress();
  }

  function updateProgress() {
    const total = data.tasks.length;
    const done = data.tasks.filter(t => t.done).length;
    const pct = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = done + ' of ' + total + ' done';
    const streak = data.streak || 1;
    document.getElementById('streakNote').textContent = streak > 1 ? '🔥 ' + streak + '-day streak' : 'Day 1 — let\'s go!';
  }

  function toggleTask(id) {
    const task = data.tasks.find(t => t.id === id);
    if (task) {
      task.done = !task.done;
      saveData(data);
      renderTasks();
    }
  }

  function deleteTask(id) {
    data.tasks = data.tasks.filter(t => t.id !== id);
    saveData(data);
    renderTasks();
  }

  function addTask(text) {
    text = text.trim();
    if (!text) return;
    data.tasks.push({ id: Date.now() + Math.random(), text, done: false });
    saveData(data);
    renderTasks();
    const list = document.getElementById('taskList');
    setTimeout(() => list.lastElementChild && list.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  }

  document.getElementById('addBtn').addEventListener('click', () => {
    const inp = document.getElementById('addInput');
    addTask(inp.value);
    inp.value = '';
  });
  document.getElementById('addInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const inp = document.getElementById('addInput');
      addTask(inp.value);
      inp.value = '';
    }
  });
  document.getElementById('clearDoneBtn').addEventListener('click', () => {
    data.tasks = data.tasks.filter(t => !t.done);
    saveData(data);
    renderTasks();
  });

  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('clock').textContent = h + ':' + m;

    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('dateline').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();

    const hr = now.getHours();
    let gr;
    if (hr < 12) gr = 'Good morning ☀️';
    else if (hr < 17) gr = 'Good afternoon 🌤';
    else if (hr < 21) gr = 'Good evening 🌙';
    else gr = 'Good night ✨';
    document.getElementById('greeting').textContent = gr;
  }
  updateClock();
  setInterval(updateClock, 10000);

  function buildBg() {
    const bg = document.getElementById('bg');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 0.8;
      s.style.cssText = `
        left:${Math.random()*100}%; top:${Math.random()*100}%;
        width:${size}px; height:${size}px;
        --d:${(Math.random()*4+2).toFixed(1)}s;
        --delay:-${(Math.random()*6).toFixed(1)}s;
        --max-op:${(Math.random()*0.6+0.3).toFixed(2)};
      `;
      bg.appendChild(s);
    }
    const colors = ['#6644cc','#cc4488','#3399cc','#44aacc'];
    const positions = [{x:10,y:30},{x:70,y:60},{x:30,y:80},{x:80,y:20}];
    colors.forEach((c, i) => {
      const a = document.createElement('div');
      a.className = 'aurora';
      const p = positions[i];
      const size = Math.random()*200 + 160;
      a.style.cssText = `
        left:${p.x}%; top:${p.y}%; width:${size}px; height:${size}px;
        background:${c};
        --d:${(Math.random()*8+6).toFixed(1)}s;
        --tx:${(Math.random()*60-30).toFixed(0)}px;
        --ty:${(Math.random()*60-30).toFixed(0)}px;
        animation-delay:-${(Math.random()*5).toFixed(1)}s;
      `;
      bg.appendChild(a);
    });
  }
  buildBg();
  renderTasks();
})();
</script>
</body>
</html>
